<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Wall | Olympia Did That</title>

  <style>
    :root{
      --overlay: 0.25;
      --panel: rgba(0,0,0,0.70);
      --panel2: rgba(0,0,0,0.62);
      --stroke: rgba(255,255,255,0.16);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.72);
      --shadow: 0 18px 50px rgba(0,0,0,0.55);
      --red: #ff3b3b;
    }

    *{ box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,var(--overlay)), rgba(0,0,0,var(--overlay))),
        url('assets/money-bg.jpg') center / cover no-repeat fixed;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 20px 60px;
    }

    /* HERO PANEL */
    .hero{
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      padding: 26px 24px;
      box-shadow: var(--shadow);
    }

    .hero h1{
      margin: 0 0 8px;
      font-size: 54px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hero p{
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.4;
    }

    .filters{
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill{
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }

    .pill.active{
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.26);
    }

    /* GRID */
    .grid{
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card{
      background: var(--panel2);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }

    .mugshot{
      height: 190px;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.35);
      border-bottom: 1px solid var(--stroke);
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .cardBody{
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .name{ font-size: 22px; font-weight: 900; margin: 0; }
    .role{ margin: 0; color: var(--muted); }
    .bills{ margin: 0; font-weight: 700; }

    .actions{
      margin-top: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn{
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btnPrimary{
      background: var(--red);
      color: #111;
    }

    .btnGhost{
      background: rgba(255,255,255,0.14);
      color: var(--text);
    }

    /* FOOTER (MATCHES BILLS STYLE) */
    .footer{
      margin-top: 34px;
      padding: 22px 0 30px;
      border-top: 1px solid var(--stroke);
      background: rgba(0,0,0,0.65);
    }

    .footerLinks{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      color: var(--muted);
    }

    .tiny{
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
      .hero h1{ font-size: 42px; }
    }

    @media (max-width: 640px){
      .grid{ grid-template-columns: 1fr; }
      .hero h1{ font-size: 36px; }
    }
  </style>
</head>

<body class="show-district">

  <div id="site-header"></div>

  <main class="wrap">

    <section class="hero">
      <h1>THE WALL OF SHAME</h1>
      <p>Click a mugshot to view the rap sheet.</p>

      <div class="filters">
        <button class="pill active" data-filter="all">ALL</button>
        <button class="pill" data-filter="tax">💰 TAX</button>
        <button class="pill" data-filter="crime">🚓 CRIME</button>
        <button class="pill" data-filter="welfare">🧾 WELFARE</button>
      </div>
    </section>

    <section class="grid" id="grid">
      <!-- cards unchanged -->
    </section>

  </main>

  <!-- MATCHING FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="wrap" style="display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap;">
      <div class="tiny">
        © 2026 Olympia Did That — Truth Fund. Paid for by People United for Washington.
      </div>
      <div class="footerLinks">
        <a href="/about.html">About Us</a>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="mailto:contact@olympiadidthat.com">Submit a Tip</a>
      </div>
    </div>
  </footer>

  <script>
    fetch("/partials/header.html")
      .then(r => r.text())
      .then(html => { document.getElementById("site-header").innerHTML = html; });

    const pills = document.querySelectorAll(".pill");
    const cards = document.querySelectorAll(".card");

    pills.forEach(btn => {
      btn.addEventListener("click", () => {
        pills.forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        const f = btn.dataset.filter;

        cards.forEach(c => {
          const tags = (c.dataset.tags || "").split(/\s+/);
          c.style.display = (f === "all" || tags.includes(f)) ? "" : "none";
        });
      });
    });
  </script>

</body>
</html>
