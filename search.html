<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Search | Olympia Did That</title>

<style>
:root{
  --overlay: 0.22;
  --stroke: rgba(255,255,255,0.18);
  --text: rgba(255,255,255,0.94);
  --muted: rgba(255,255,255,0.78);
  --shadow: 0 18px 50px rgba(0,0,0,0.50);
  --radius: 18px;
  --max: 1180px;
  --panelBg: rgba(0,0,0,0.70);
  --panelBg2: rgba(0,0,0,0.62);
  --red: #ff3b3b;
}

*{ box-sizing:border-box; }
html, body{ height:100%; }

body{
  margin:0;
  font-family: Arial, system-ui, sans-serif;
  color: var(--text);
  background:
    linear-gradient(rgba(0,0,0,var(--overlay)), rgba(0,0,0,var(--overlay))),
    url("/assets/money-bg.jpg") center / cover no-repeat fixed;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

#site-header{ position:sticky; top:0; z-index:1000; }
main{ flex:1 0 auto; }

.wrap{ max-width:var(--max); margin:0 auto; padding:20px; }

.panel{
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  background:var(--panelBg);
  box-shadow:var(--shadow);
  padding:22px;
}

h1{
  margin:0 0 12px;
  font-size: clamp(30px, 3.2vw, 46px);
  text-transform:uppercase;
  letter-spacing:0.6px;
}

.result{
  border:1px solid var(--stroke);
  border-radius:18px;
  background:var(--panelBg2);
  padding:16px;
  margin-top:14px;
}

.result a{
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:0.4px;
  text-decoration:none;
}

.result p{
  margin:8px 0 0;
  color:var(--muted);
}

.noResults{
  margin-top:14px;
  padding:16px;
  border:1px solid var(--stroke);
  border-radius:18px;
  background:var(--panelBg2);
}

.btn{
  display:inline-block;
  padding:10px 14px;
  border-radius:14px;
  background:rgba(255,59,59,0.92);
  color:#111;
  font-weight:900;
  text-transform:uppercase;
  text-decoration:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="site-header"></div>

<main>
  <div class="wrap">
    <div class="panel">
      <h1>Search Results</h1>
      <div id="meta"></div>
      <div id="results"></div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script>
async function inject(selector, url){
  const el = document.querySelector(selector);
  if (!el) return;
  const res = await fetch(url, { cache: "no-cache" });
  el.innerHTML = await res.text();
}

function getQuery(){
  const url = new URL(window.location.href);
  return (url.searchParams.get("q") || "").trim();
}

function tokenize(q){
  return q.toLowerCase().split(/[\s\-_,.()]+/).filter(Boolean);
}

function score(item, tokens){
  const text = (item.title + " " + item.tags.join(" ") + " " + item.snippet).toLowerCase();
  let s = 0;
  tokens.forEach(t => {
    if(text.includes(t)) s += 10;
  });
  return s;
}

async function run(){
  await inject("#site-header","/partials/header.html");
  await inject("#site-footer","/partials/footer.html");

  const q = getQuery();
  const meta = document.getElementById("meta");
  const resultsDiv = document.getElementById("results");

  if(!q){
    meta.textContent = "Enter a search term above.";
    return;
  }

  const res = await fetch("/search-index.json");
  const data = await res.json();
  const tokens = tokenize(q);

  const matches = data
    .map(d => ({...d, score: score(d,tokens)}))
    .filter(d => d.score > 0)
    .sort((a,b)=> b.score - a.score);

  if(matches.length){
    meta.textContent = `Found ${matches.length} result(s) for "${q}".`;

    matches.forEach(m=>{
      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <a href="${m.url}">${m.title}</a>
        <p>${m.snippet}</p>
      `;
      resultsDiv.appendChild(div);
    });

  } else {

    meta.textContent = `No matches found for "${q}".`;

    resultsDiv.innerHTML = `
      <div class="noResults">
        Want us to add it?
        <br>
        <a class="btn"
           href="mailto:contact@olympiadidthat.com?subject=Site Search Suggestion&body=I searched for: ${encodeURIComponent(q)}">
           Suggest "${q}"
        </a>
      </div>
    `;
  }
}

run();
</script>

</body>
</html>
