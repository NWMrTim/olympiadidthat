<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taxes | The Bills | Olympia Did That</title>

  <style>
    :root{
      --overlay: 0.22;
      --stroke: rgba(255,255,255,0.18);
      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.78);
      --shadow: 0 18px 50px rgba(0,0,0,0.50);
      --radius: 18px;
      --max: 1180px;

      /* Readability */
      --panelBg: rgba(0,0,0,0.70);
      --cardBg: rgba(255,255,255,0.12);
    }

    *{ box-sizing:border-box; }

    html, body{ height: 100%; }

    body{
      margin:0;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,var(--overlay)), rgba(0,0,0,var(--overlay))),
        url("/assets/money-bg.jpg") center / cover no-repeat fixed;

      /* Sticky footer layout */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Links */
    a{ color:inherit; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    /* Header mount point (header.html is sticky already) */
    #site-header{ position: sticky; top:0; z-index:1000; }

    main{ flex: 1 0 auto; }

    .wrap{ max-width:var(--max); margin:0 auto; padding:20px; }

    .panel{
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panelPad{ padding: 22px; }

    h1{
      margin:0 0 10px;
      font-size: clamp(30px, 3.2vw, 46px);
      line-height:1.05;
      text-transform: uppercase;
      letter-spacing:0.6px;
    }
    .sub{ margin:0; color:var(--muted); line-height:1.55; max-width: 75ch; }

    .tabs{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 14px; }
    .tab{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.14);
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .tab.active{ background: rgba(255,255,255,0.20); }
    .tab:hover{ text-decoration:none; filter:brightness(1.06); }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:14px; }

    .bill{
      border: 1px solid var(--stroke);
      border-radius: 16px;
      background: var(--cardBg);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .billTop{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .billCode{ font-weight: 900; letter-spacing:0.4px; }

    .pill{
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,0.40);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* Status colors */
    .pill.passed{
      background: rgba(46, 204, 113, 0.22);
      border-color: rgba(46, 204, 113, 0.60);
      color: rgba(220, 255, 235, 0.98);
    }
    .pill.committee{
      background: rgba(241, 196, 15, 0.22);
      border-color: rgba(241, 196, 15, 0.60);
      color: rgba(255, 248, 220, 0.98);
    }
    .pill.introduced{
      background: rgba(52, 152, 219, 0.22);
      border-color: rgba(52, 152, 219, 0.60);
      color: rgba(225, 248, 255, 0.98);
    }
    .pill.signed{
      background: rgba(155, 89, 182, 0.22);
      border-color: rgba(155, 89, 182, 0.60);
      color: rgba(250, 235, 255, 0.98);
    }
    .pill.blocked{
      background: rgba(231, 76, 60, 0.22);
      border-color: rgba(231, 76, 60, 0.60);
      color: rgba(255, 228, 228, 0.98);
    }
    .pill.proposed{
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.26);
      color: rgba(255,255,255,0.90);
    }

    .billTitle{ margin-top:8px; font-weight:900; }
    .billDesc{ margin-top:6px; color: var(--muted); line-height:1.5; }
    .billMeta{ margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; color: var(--muted); font-size: 13px; }

    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <!-- Shared header gets injected here -->
  <div id="site-header"></div>

  <main>
    <div class="wrap" style="padding-top:22px;">
      <section class="panel panelPad">
        <h1>The Bills: Taxes</h1>
        <p class="sub">
          The tax & cost-of-living hit list. Status badges are color-coded (Proposed / Introduced / In Committee / Passed / Signed / Blocked).
        </p>

        <div class="tabs">
          <a class="tab active" href="taxes.html">💰 Taxes</a>
          <a class="tab" href="crime.html">🚔 Crime</a>
        </div>
      </section>

      <section class="panel panelPad" style="margin-top:14px;">
        <div style="font-weight:900; text-transform:uppercase; letter-spacing:0.4px;">The Olympia Did That Hit List</div>
        <div class="grid" id="grid"></div>
        <div style="margin-top:12px; color:var(--muted); font-size:13px;">
          If you later update each bill’s status text (e.g., “In Committee”), the badge color will auto-update.
        </div>
      </section>
    </div>
  </main>

  <!-- Shared footer gets injected here -->
  <div id="site-footer"></div>

  <script>
    // Inject shared header + footer
    fetch("/partials/header.html")
      .then(r => r.text())
      .then(html => { document.getElementById("site-header").innerHTML = html; })
      .catch(() => {});

    fetch("/partials/footer.html")
      .then(r => r.text())
      .then(html => { document.getElementById("site-footer").innerHTML = html; })
      .catch(() => {});

    const taxBills = [
      {
        code: "SB 6346",
        status: "Proposed",
        title: "The Income Tax “Foot in the Door”",
        desc: "Framed as a “Millionaires Tax,” but it builds the administrative machinery for a universal state income tax.",
        sponsors: "Driver (draft): Rep. Joe Fitzgibbon",
        impact: "Bottom Line: Build it now, tax everyone later."
      },
      {
        code: "SB 5770",
        status: "Proposed",
        title: "The Forever-Hike Property Tax",
        desc: "Triples the annual growth cap from 1% to 3% without a vote — turning homeownership into a yearly cost ratchet.",
        sponsors: "Lead Sponsor (draft): Rep. April Berg",
        impact: "Bottom Line: Your home becomes the state’s piggy bank."
      },
      {
        code: "SB 6345",
        status: "Proposed",
        title: "The “Pain at the Pump” Ferry Tax",
        desc: "Hikes the gas tax again to fund hybrid-electric ferries and other projects while roads and bridges crumble.",
        sponsors: "Architect (draft): Sen. Marko Liias",
        impact: "Bottom Line: You pay more at the pump; they get a shiny project."
      },
      {
        code: "SB 6347",
        status: "Proposed",
        title: "The “Death Tax” Expansion",
        desc: "Claws back exemptions for family-owned businesses and farms — making it harder to pass your life’s work to your kids.",
        sponsors: "Backed by budget leadership (draft)",
        impact: "Bottom Line: Olympia takes a final cut when you’re gone."
      },
      {
        code: "HB 2079",
        status: "Proposed",
        title: "The Nanny-State Alcohol Tax",
        desc: "Another “sin tax” framed as “community funding” — used to plug a budget hole caused by overspending.",
        sponsors: "Supported by nanny-state bloc (draft)",
        impact: "Bottom Line: They tax your weekend to pay for their mess."
      },
      {
        code: "HB 1940",
        status: "Proposed",
        title: "The Vice Squeeze",
        desc: "Targets high-THC products with massive excise taxes, pushing consumers back to the black market.",
        sponsors: "Revenue expansion caucus (draft)",
        impact: "Bottom Line: Cash grab over smart policy."
      }
      {
        code: "SB 6346",
        status: "Passed Senate",
        title: "The 9.9% Income Tax",
        desc: "Establishes a 9.9% tax on individual income above $1 million. Passed the Senate 27–22 and moved to the House.",
        sponsors: "Lead Sponsor: Sen. Jamie Pedersen",
        impact: "Bottom Line: Washington moves toward a state income tax targeting high earners — setting the stage for future expansion."
      },
      {
        code: "HB 2724",
        status: "House Companion",
        title: "Income Tax Companion Bill",
        desc: "The official House companion to SB 6346, advancing the 9.9% income tax proposal through the lower chamber.",
        sponsors: "House Companion to SB 6346",
        impact: "Bottom Line: Ensures the income tax proposal advances in both chambers."
      },
    ];

    function statusClass(status){
      const s = (status || "").toLowerCase();
      if (s.includes("signed")) return "signed";
      if (s.includes("passed")) return "passed";
      if (s.includes("committee")) return "committee";
      if (s.includes("introduced")) return "introduced";
      if (s.includes("blocked") || s.includes("killed") || s.includes("dead")) return "blocked";
      if (s.includes("proposal") || s.includes("proposed")) return "proposed";
      return "proposed";
    }

    function billCard(b){
      return `
        <article class="bill">
          <div class="billTop">
            <div class="billCode">${b.code}</div>
            <div class="pill ${statusClass(b.status)}">${b.status}</div>
          </div>
          <div class="billTitle">${b.title}</div>
          <div class="billDesc">${b.desc}</div>
          <div class="billMeta">
            <span>${b.sponsors}</span>
            <span>•</span>
            <span>${b.impact}</span>
          </div>
        </article>
      `;
    }

    document.getElementById("grid").innerHTML = taxBills.map(billCard).join("");
  </script>
</body>
</html>
