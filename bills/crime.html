<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crime | The Bills | Olympia Did That</title>

  <style>
    :root{
      --overlay: 0.22;
      --stroke: rgba(255,255,255,0.18);
      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.78);
      --shadow: 0 18px 50px rgba(0,0,0,0.50);
      --radius: 18px;
      --max: 1180px;

      --panelBg: rgba(0,0,0,0.70);
      --cardBg: rgba(255,255,255,0.12);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,var(--overlay)), rgba(0,0,0,var(--overlay))),
        url("/assets/money-bg.jpg") center / cover no-repeat fixed;

      /* ✅ sticky-footer behavior */
      min-height: 100vh;
      display:flex;
      flex-direction:column;
    }

    a{ color:inherit; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    /* Header partial handles its own sticky behavior */
    #site-header{ z-index:1000; }

    main{ flex: 1 0 auto; }

    .wrap{ max-width:var(--max); margin:0 auto; padding:20px; }

    .panel{
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--panelBg);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panelPad{ padding: 22px; }

    h1{
      margin:0 0 10px;
      font-size: clamp(30px, 3.2vw, 46px);
      line-height:1.05;
      text-transform: uppercase;
      letter-spacing:0.6px;
    }
    .sub{ margin:0; color:var(--muted); line-height:1.55; max-width: 75ch; }

    .tabs{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 14px; }
    .tab{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.14);
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .tab.active{ background: rgba(255,255,255,0.20); }
    .tab:hover{ text-decoration:none; filter:brightness(1.06); }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:14px; }

    .bill{
      border: 1px solid var(--stroke);
      border-radius: 16px;
      background: var(--cardBg);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .billTop{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .billCode{ font-weight: 900; letter-spacing:0.4px; }

    .pill{
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,0.40);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .pill.passed{
      background: rgba(46, 204, 113, 0.22);
      border-color: rgba(46, 204, 113, 0.60);
      color: rgba(220, 255, 235, 0.98);
    }
    .pill.committee{
      background: rgba(241, 196, 15, 0.22);
      border-color: rgba(241, 196, 15, 0.60);
      color: rgba(255, 248, 220, 0.98);
    }
    .pill.introduced{
      background: rgba(52, 152, 219, 0.22);
      border-color: rgba(52, 152, 219, 0.60);
      color: rgba(225, 248, 255, 0.98);
    }
    .pill.signed{
      background: rgba(155, 89, 182, 0.22);
      border-color: rgba(155, 89, 182, 0.60);
      color: rgba(250, 235, 255, 0.98);
    }
    .pill.blocked{
      background: rgba(231, 76, 60, 0.22);
      border-color: rgba(231, 76, 60, 0.60);
      color: rgba(255, 228, 228, 0.98);
    }
    .pill.proposed{
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.26);
      color: rgba(255,255,255,0.90);
    }

    .billTitle{ margin-top:8px; font-weight:900; }
    .billDesc{ margin-top:6px; color: var(--muted); line-height:1.5; }
    .billMeta{ margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; color: var(--muted); font-size: 13px; }

    .tiny{ color:var(--muted); font-size:13px; }

    .sr-only{
      position:absolute;width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
    }

    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main>
    <div class="wrap" style="padding-top:22px;">
      <section class="panel panelPad">
        <h1>The Bills: Crime</h1>
        <p class="sub">
          The “Safe Streets” warning list. Status badges are color-coded (Proposed / Introduced / In Committee / Passed / Signed / Blocked).
        </p>

        <div class="tabs">
          <a class="tab" href="/bills/taxes.html">💰 Taxes</a>
          <a class="tab active" href="/bills/crime.html">🚔 Crime</a>
        </div>
      </section>

      <section class="panel panelPad" style="margin-top:14px;">
        <div style="font-weight:900; text-transform:uppercase; letter-spacing:0.4px;">The “Safe Streets” Warning List</div>
        <div class="grid" id="grid"></div>
        <div id="pagefind-index" class="sr-only" data-pagefind-body></div>
        <div class="tiny" style="margin-top:12px;">
          As of today, bill status is updated manually. We are working on automatic updates.
        </div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>
    async function inject(selector, url){
      const el = document.querySelector(selector);
      if (!el) return;
      try{
        const res = await fetch(url, { cache: "no-cache" });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        el.innerHTML = await res.text();
      }catch(err){
        console.warn("Inject failed:", url, err);
        el.innerHTML = "";
      }
    }

    const crimeBills = [
      {
        code: "SB 5269",
        status: "Re-Introduced",
        title: "Retroactive Sentence Cuts",
        desc: "Gives judges the power to retroactively cut sentences — pushing “decarceration” even for serious offenses.",
        sponsors: "Primary force (draft): Sen. Noel Frame",
        impact: "Bottom Line: The prison door swings open sooner."
      },
      {
        code: "SB 5266",
        status: "Re-Introduced",
        title: "Sentencing Reform Expansion",
        desc: "Broad sentencing reforms that reduce enhancements and shorten prison stays across categories.",
        sponsors: "Primary force (draft): Sen. Noel Frame",
        impact: "Bottom Line: Shorter sentences, fewer consequences."
      },
      {
        code: "SB 5475",
        status: "Re-Introduced",
        title: "“25 is the New 18”",
        desc: "Treats violent offenders up to age 25 as “emerging adults,” shifting policy toward lighter accountability.",
        sponsors: "Lead advocate (draft): Sen. Manka Dhingra",
        impact: "Bottom Line: Serious offenders get lighter handling."
      },
      {
        code: "SB 5974",
        status: "Re-Introduced",
        title: "Overturning Elected Sheriffs Bill",
        desc: "Establishes procedures that could enable removal or override of locally elected officials under certain state-level actions.",
        sponsors: "Reintroduced in Senate (2026 session)",
        impact: "Bottom Line: Expands state-level power to overturn voter-elected local officials."
      },
      {
        code: "HB 1274",
        status: "Committee: Appropriations",
        title: "Juvenile Point Wipe",
        desc: "Retroactively removes juvenile history from adult sentencing scores.",
        sponsors: "Stearns, Macri, Doglio",
        impact: "Bottom Line: Shorter sentences by rewriting criminal history."
      },
      {
        code: "HB 1169",
        status: "Re-Introduced",
        title: "Enhancement Cut",
        desc: "Removes mandatory consecutive sentencing for firearm and gang crimes.",
        sponsors: "Goodman, Fitzgibbon",
        impact: "Bottom Line: Removes the teeth — fewer consequences for violent crime."
      },
      {
        code: "HB 1239",
        status: "Committee: Appropriations",
        title: "Good Behavior Giveaway",
        desc: "Expands earned release time, letting inmates out sooner (as low as 2/3 served).",
        sponsors: "House Progressives (draft)",
        impact: "Bottom Line: Get-out-early card for serious offenders."
      }
    ];

    function statusClass(status){
      const s = (status || "").toLowerCase();
      if (s.includes("signed")) return "signed";
      if (s.includes("passed")) return "passed";
      if (s.includes("committee")) return "committee";
      if (s.includes("introduced")) return "introduced";
      if (s.includes("blocked") || s.includes("killed") || s.includes("dead")) return "blocked";
      if (s.includes("proposal") || s.includes("proposed")) return "proposed";
      return "proposed";
    }

    function billCard(b){
      return `
        <article class="bill">
          <div class="billTop">
            <div class="billCode">${b.code}</div>
            <div class="pill ${statusClass(b.status)}">${b.status}</div>
          </div>
          <div class="billTitle">${b.title}</div>
          <div class="billDesc">${b.desc}</div>
          <div class="billMeta">
            <span>${b.sponsors}</span>
            <span>•</span>
            <span>${b.impact}</span>
          </div>
        </article>
      `;
    }
    function buildPagefindIndex(bills){
      return bills.map(b => {
        const codeNoSpace = (b.code || "").replace(/\s+/g, "");
        return `
          ${b.code} ${codeNoSpace}
          ${b.title || ""}
          ${b.desc || ""}
          ${b.sponsors || ""}
          ${b.impact || ""}
        `;
      }).join("\n");
    }
    
    (async () => {
      await inject("#site-header", "../partials/header.html");
      await inject("#site-footer", "../partials/footer.html");

      document.getElementById("grid").innerHTML = taxBills.map(billCard).join("");

      document.getElementById("pagefind-index").innerText =
        buildPagefindIndex(crimeBills);
    })();
  </script>
</body>
</html>
