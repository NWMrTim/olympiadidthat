<!-- /partials/header-dev.html -->
<header class="siteHeader">
  <div class="headerInner">

    <a class="brand brandLogo" href="/index.html" aria-label="Olympia Did That home">
       <img src="/assets/ODT-Logo-with-URL.png"
       alt="Olympia Did That"
       class="brandImg" />
    </a>

    <nav class="nav" aria-label="Primary navigation">
      <a class="navBtn" href="/wall.html"><span>The Wall</span><span>of Shame</span></a>
      <a class="navBtn" href="/heros.html"><span>The Wall</span><span>of Heroes</span></a>
      <a class="navBtn" href="/bills/billindex.html"><span>Suspect</span><span>Bills</span></a>
      <a class="navBtn" href="/events.html"><span>Upcoming</span><span>Events</span></a>
      <a class="navBtn" href="/action.html"><span>Take</span><span>Action</span></a>
    </nav>

    <form class="search" onsubmit="return window.ODT_siteSearch && window.ODT_siteSearch(event);">
      <input id="q" type="search" placeholder="Search..." aria-label="Search" />
      <button type="submit">Search</button>
    </form>

    <a class="districtBtn"
       href="https://app.leg.wa.gov/DistrictFinder/"
       target="_blank" rel="noopener">
      <span>Legislative</span>
      <span>District Finder</span>
    </a>

  </div>
</header>

<style>
:root{
  --hdrStroke: rgba(255,255,255,0.18);
  --hdrText: rgba(255,255,255,0.94);
  --hdrShadow: 0 18px 40px rgba(0,0,0,0.45);
  --glass: rgba(0,0,0,0.52);
  --chip: rgba(255,255,255,0.12);

  --glow: 0 0 0 1px rgba(255,255,255,0.18), 0 14px 34px rgba(0,0,0,0.45);
  --glowActive: 0 0 0 2px rgba(255,255,255,0.28), 0 0 22px rgba(255,255,255,0.18), 0 18px 44px rgba(0,0,0,0.55);
}

.siteHeader{
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.70);
  border-bottom: 1px solid var(--hdrStroke);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background .18s ease, transform .18s ease;
}

.headerInner{
  max-width: 1180px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: nowrap;
  transition: padding .18s ease;
}

.siteHeader.isShrunk{ background: rgba(0,0,0,0.78); }
.siteHeader.isShrunk .headerInner{ padding: 8px 20px; }

.brand{
  flex: 0 0 auto;
  display: inline-flex;
  text-decoration: none;
  color: var(--hdrText);
  font-weight: 900;
  text-transform: uppercase;
  white-space: nowrap;
}
.brandTop,.brandBottom{ font-size: 16px; line-height: 1.05; }
/* Logo image brand */
.brandLogo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.brandImg {
  height: 52px;              /* desktop size */
  width: auto;
  display: block;
  transition: transform .15s ease, filter .15s ease;
}

.brandLogo:hover .brandImg {
  transform: scale(1.04);
  filter: brightness(1.08);
}
.nav{ display:flex; gap:12px; white-space:nowrap; }

.navBtn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap: 1px;

  padding: 8px 12px;
  border-radius: 14px;
  border: 1px solid var(--hdrStroke);
  background: var(--chip);
  color: var(--hdrText);
  text-decoration: none;
  box-shadow: var(--hdrShadow);

  font-size: 13px;
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1.05;
  white-space: nowrap;

  transition: background .14s ease, transform .14s ease, box-shadow .14s ease, filter .14s ease, border-color .14s ease;
}

.navBtn:hover{
  background: rgba(255,255,255,0.20);
  transform: translateY(-1px);
  box-shadow: var(--glow);
}
.navBtn.active{
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.30);
  box-shadow: var(--glowActive);
}

.search{
  flex: 0 1 400px;
  max-width: 400px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 240px;
  margin-left: 6px;
}

.search input{
  flex: 1;
  min-width: 180px;
  padding: 9px 12px;
  border-radius: 14px;
  border: 1px solid var(--hdrStroke);
  background: var(--glass);
  color: var(--hdrText);
  outline: none;
}

.search button{
  padding: 9px 12px;
  border-radius: 14px;
  border: 1px solid var(--hdrStroke);
  background: rgba(255,255,255,0.20);
  color: var(--hdrText);
  font-weight: 900;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--hdrShadow);
  appearance: none;
  transition: background .14s ease, transform .14s ease, box-shadow .14s ease, filter .14s ease, border-color .14s ease;
}
.search button:hover{
  background: rgba(255,255,255,0.26);
  transform: translateY(-1px);
  box-shadow: var(--glow);
}

.districtBtn{
  margin-left: auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap: 2px;

  padding: 10px 14px;
  border-radius: 16px;
  border: 1px solid var(--hdrStroke);
  background: rgba(255,255,255,0.14);
  color: var(--hdrText);
  text-decoration: none;
  box-shadow: var(--hdrShadow);

  font-size: 14px;
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1.1;
  white-space: nowrap;

  transition: background .14s ease, transform .14s ease, box-shadow .14s ease, filter .14s ease, border-color .14s ease;
}
.districtBtn:hover{
  background: rgba(255,255,255,0.20);
  transform: translateY(-1px);
  box-shadow: var(--glow);
}

@media (max-width: 1080px){
  .districtBtn{ display:none; }
  .search{ flex: 1; max-width:none; }
}

/* ✅ Mobile Layout + ✅ NOT sticky on mobile (scrolls away) */
@media (max-width: 720px){
  .siteHeader{ position: static; } /* ⭐ key fix for “too much space” */
  
  .brandImg {
    height: 44px;
  }
  
  .headerInner{
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .nav{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .navBtn{
    width: 100%;
    padding: 14px 12px;
    font-size: 18px;
    border-radius: 16px;
    white-space: normal;
  }

  .search input{
    padding: 14px;
    border-radius: 18px;
    font-size: 18px;
  }
  .search button{
    padding: 14px 16px;
    border-radius: 18px;
    font-size: 18px;
  }

  .districtBtn{
    display:flex;
    width: 100%;
    border-radius: 18px;
    padding: 14px;
    font-size: 15px;
    white-space: normal;
  }

  .siteHeader.isShrunk .headerInner{ padding: 14px 20px; }
}
</style>

<script>
(function(){
  // Active highlight
  const path = (location.pathname || "/").toLowerCase();
  document.querySelectorAll(".navBtn").forEach(a => {
    const href = (a.getAttribute("href") || "").toLowerCase();
    const isBillsSection = href.includes("/bills/") && path.startsWith("/bills/");
    const isActive = isBillsSection || (href && (path === href));
    if (isActive) a.classList.add("active");
  });

  // Shrink on scroll (desktop/tablet only)
  const header = document.querySelector(".siteHeader");
  if (!header) return;

  const mqMobile = window.matchMedia("(max-width: 720px)");
  let last = null;

  function onScroll(){
    if (mqMobile.matches){
      header.classList.remove("isShrunk");
      last = false;
      return;
    }
    const shrunk = window.scrollY > 24;
    if (shrunk !== last){
      header.classList.toggle("isShrunk", shrunk);
      last = shrunk;
    }
  }

  window.addEventListener("scroll", onScroll, { passive: true });
  onScroll();
})();
</script>

<script src="/assets/site.js" defer></script>
